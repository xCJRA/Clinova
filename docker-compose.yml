services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: clinova_app
        ports:
            - "8082:80"
        volumes:
            - ./:/var/www/html
            - ./docker/apache/vhost.conf:/etc/apache2/sites-enabled/000-default.conf
        env_file:
            - .env.docker
        depends_on:
            - db
    db:
        image: mysql:8.0
        container_name: clinova_db
        restart: always
        env_file:
            - .env.docker
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
        ports:
            - "3307:3306"
        volumes:
            - db_data:/var/lib/mysql
            - ./docker/mysql/init:/docker-entrypoint-initdb.d
    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        container_name: clinova_phpmyadmin
        ports:
            - "8081:80"
        environment:
            PMA_HOST: db
        depends_on:
            - db
    backup:
        image: mysql:8.0
        container_name: clinova_backup
        depends_on:
            - db
        env_file:
            - .env.docker
        volumes:
            - ./backups:/backups
        entrypoint: >
            sh -c "
            echo 'Esperando a MySQL...';
            until mysqladmin ping -h db -u ${DB_USERNAME} -p${DB_PASSWORD} --silent; do
            sleep 3;
            done;

            echo 'MySQL listo, iniciando backups...';

            while true; do
            mysqldump -h db -u ${DB_USERNAME} -p${DB_PASSWORD} ${DB_DATABASE} > /backups/backup_$(date +%F_%H-%M-%S).sql;

            find /backups -type f -mtime +7 -delete;

            sleep 86400;
            done
            "
volumes:
    db_data:
